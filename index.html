<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Martin Builder OS</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/martin-logo.png?v=2">
    <link rel="icon" type="image/png" sizes="192x192" href="/martin-logo.png?v=2">
    <link rel="icon" type="image/png" sizes="512x512" href="/martin-logo.png?v=2">
    <link rel="shortcut icon" href="/martin-logo.png?v=2">
    <meta name="theme-color" content="#4179bc">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/martin-logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Suppress the browser's native PWA install mini-infobar immediately.
        // The React PWAInstallButton component handles the install prompt instead.
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
        window.addEventListener('appinstalled', () => { deferredPrompt = null; });
        window.triggerPWAInstall = function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
            }
        };
    </script>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div style="display: flex; min-height: 100vh; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; font-family: system-ui, sans-serif; color: #334155;">
            <div style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            <p style="font-weight: 500;">Loading Martin Builder OS...</p>
            <p style="font-size: 12px; color: #94a3b8; max-width: 280px; text-align: center;">If this doesn’t change: run <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;">npm run dev</code> in the project folder, then open the <strong>Local</strong> URL from the terminal (e.g. http://localhost:8080) in Chrome or Edge.</p>
        </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <script type="module">
      window.__appLoadError = null;
      window.addEventListener('error', function(e) { window.__appLoadError = window.__appLoadError || (e.message || String(e)); });
      window.addEventListener('unhandledrejection', function(e) { window.__appLoadError = window.__appLoadError || (e.reason && (e.reason.message || String(e.reason))); });
      (async function() {
        try {
          await import('/src/main.tsx');
        } catch (e) {
          var root = document.getElementById('root');
          if (root) {
            var msg = (e && (e.message || e.reason && (e.reason.message || String(e.reason))) || String(e)) || 'Unknown error';
            root.innerHTML = '<div style="display:flex;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:1rem;font-family:system-ui;padding:2rem;text-align:center;color:#334155;">' +
              '<h1 style="color:#dc2626;font-size:1.25rem;">Failed to load app</h1>' +
              '<pre style="background:#f1f5f9;padding:1rem;border-radius:8px;text-align:left;overflow:auto;max-width:100%;font-size:12px;margin:0;">' + (msg.replace(/</g,'&lt;').replace(/>/g,'&gt;')) + '</pre>' +
              '<p style="color:#64748b;font-size:14px;">Check the browser console (F12) for more details.</p>' +
              '<button onclick="location.reload()" style="padding:10px 24px;cursor:pointer;background:#22c55e;color:white;border:none;border-radius:8px;font-weight:500;">Retry</button></div>';
          }
        }
      })();
      setTimeout(function() {
        var root = document.getElementById('root');
        if (!root) return;
        var text = (root.innerText || '') + (root.textContent || '');
        if (text.indexOf('Loading Martin Builder OS') !== -1) {
          var err = window.__appLoadError || 'The app did not start. Open Developer Tools (F12) and check the Console for errors.';
          root.innerHTML = '<div style="display:flex;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:1rem;font-family:system-ui;padding:2rem;text-align:center;color:#334155;">' +
            '<h1 style="color:#dc2626;">App did not load</h1>' +
            '<p style="color:#64748b;">' + (err.replace(/</g,'&lt;').replace(/>/g,'&gt;')) + '</p>' +
            '<button onclick="location.reload()" style="padding:10px 24px;cursor:pointer;background:#22c55e;color:white;border:none;border-radius:8px;">Retry</button></div>';
        }
      }, 6000);
    </script>
</body>
</html>
